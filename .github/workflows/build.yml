name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev cython3 lld libffi-dev libssl-dev
          pip install buildozer cython
      - name: Build APK
        run: |
          buildozer -v android debug
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: roro-apk
          path: bin/*.apk
